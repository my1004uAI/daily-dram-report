name: Daily DRAM Report

on:
  workflow_dispatch:
  schedule:
    # 07:07 Asia/Seoul = 22:07 UTC (previous day)
    - cron: '7 22 * * *'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib python-docx requests feedparser

      - name: Generate and upload report
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python generate_report.py

      - name: Upload local artifact copy
        uses: actions/upload-artifact@v4
        with:
          name: daily-dram-report
          path: DRAM_논문_특허_ChatGPT_*.docx
